services:
  - type: web
    name: caerus-os-api
    runtime: node
    plan: starter
    buildCommand: npm install && npm run db:generate && npm run build --workspace @caerus/api
    startCommand: npm run db:deploy && node apps/api/dist/main.js
    healthCheckPath: /api/modules/command-center
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_FROM
        value: security@caerus.local
      - key: AI_PROVIDER
        value: openai-compatible
      - key: AI_API_KEY
        sync: false
