name: CAERUS OS CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: caerus_os
          POSTGRES_USER: caerus
          POSTGRES_PASSWORD: caerus
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run typecheck
      - run: npm run build
        env:
          DATABASE_URL: postgresql://caerus:caerus@localhost:5432/caerus_os?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci-access
          JWT_REFRESH_SECRET: ci-refresh
